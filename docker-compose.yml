services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U portfolio -d portfolio']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Hono.js ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: portfolio_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      # Aislar node_modules del host para no pisarlos
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/contracts/node_modules
      - /app/packages/logger/node_modules
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy

  # ── Web Astro ────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: portfolio_web
    restart: unless-stopped
    ports:
      - '4321:4321'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/contracts/node_modules
      - /app/packages/logger/node_modules
    environment:
      - API_URL=http://api:3000
    depends_on:
      - api

  # ── Admin Angular ────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile.dev
    container_name: portfolio_admin
    restart: unless-stopped
    ports:
      - '4200:4200'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/admin/node_modules
      - /app/packages/contracts/node_modules
      - /app/packages/logger/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
